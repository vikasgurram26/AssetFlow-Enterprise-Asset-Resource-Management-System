{% extends "core/base.html" %}
{% block page_title %}Activity log{% endblock %}
{% block content %}
<div class="card-clean">
  <table class="data w-100 mb-0">
    <thead><tr><th>User</th><th>Action</th><th>When</th></tr></thead>
    <tbody>
      {% for log in logs %}
      <tr><td>{{ log.user|default:"System" }}</td><td>{{ log.description }}</td><td class="text-muted">{{ log.created_at|timesince }} ago</td></tr>
      {% empty %}<tr><td colspan="3" class="text-center text-muted py-4">No activity yet.</td></tr>{% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
