{% extends "core/base.html" %}
{% block title %}Sign in — AssetFlow{% endblock %}
{% block guest_content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:#131b2e;">
  <div style="width:360px; background:#fff; border-radius:14px; padding:36px 32px;">
    <div style="font-weight:700; font-size:20px; margin-bottom:4px;">Asset<span style="color:#7c3aed">Flow</span></div>
    <div style="color:#667085; font-size:14px; margin-bottom:24px;">Sign in to your account</div>
    {% if messages %}{% for message in messages %}<div class="alert alert-danger py-2">{{ message }}</div>{% endfor %}{% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="mb-3"><label class="form-label">Username</label><input type="text" name="username" class="form-control" required autofocus></div>
      <div class="mb-3"><label class="form-label">Password</label><input type="password" name="password" class="form-control" required></div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
    <div class="text-center small mt-3"><a href="{% url 'signup' %}">New here? Create an employee account</a></div>
  </div>
</div>
{% endblock %}
