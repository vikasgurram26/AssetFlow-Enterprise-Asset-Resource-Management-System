{% extends "core/base.html" %}
{% block page_title %}Raise maintenance request{% endblock %}
{% block content %}
<div class="card-clean p-4" style="max-width:520px">
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3">
        <label class="form-label">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors|striptags }}</div>{% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Submit request</button>
    <a href="{% url 'maintenance_list' %}" class="btn btn-outline-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
